<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quietly · quotes</title>
  <!-- font palette: Inter (clean) + Playfair (refined serif for featured quote) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,500..700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ---------- modern calm reset ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* LIGHT THEME — fresh beige & light green */
    :root {
      --bg: rgba(250, 243, 224, 0.85);        /* soft beige background */
      --surface: rgba(255, 250, 240, 0.8);     /* floral white / cream */
      --ink: #2C3E2B;                           /* deep forest */
      --ink-soft: #4D5F4A;                       /* softer greenish gray */
      --ink-muted: #6F8270;                      /* muted sage */
      --line: #D6D9C9;                           /* light olive beige */
      --line-strong: #B9C0A8;                    /* medium olive */
      --accent: #6B8E4C;                          /* fresh muted green */
      --accent-soft: rgba(107, 142, 76, 0.15);
      --accent-glow: rgba(107, 142, 76, 0.3);
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition: all 0.25s ease;
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-focus: 0 8px 24px rgba(0, 0, 0, 0.05);
    }

    /* DARK THEME — deep blue & dark green */
    [data-theme="dark"] {
      --bg: rgba(8, 22, 33, 0.9);               /* rich navy */
      --surface: rgba(18, 38, 45, 0.85);          /* deep teal-blue */
      --ink: #E2F0E6;                             /* soft mint white */
      --ink-soft: #B6D0C2;                         /* seafoam */
      --ink-muted: #7A9B8A;                         /* muted sage */
      --line: #2A4048;                              /* dark slate */
      --line-strong: #3A5B5F;                        /* greenish grey */
      --accent: #2E8B6F;                             /* deep emerald / teal */
      --accent-soft: rgba(46, 139, 111, 0.25);
      --accent-glow: rgba(46, 139, 111, 0.4);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.6);
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s, border-color 0.2s;
      min-height: 100vh;
      position: relative;
    }

    /* ---------- FLOATING BACKGROUND OBJECTS (visible & dynamic) ---------- */
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .shape {
      position: absolute;
      background: radial-gradient(circle at 30% 30%, var(--accent) 0%, transparent 80%);
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.35;
      animation: float 24s infinite alternate ease-in-out;
      will-change: transform;
    }

    /* additional shapes with different colors and forms */
    .shape-square {
      background: radial-gradient(circle at 70% 20%, #d94f3b 0%, transparent 80%);
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* organic blob */
      filter: blur(25px);
    }
    .shape-line {
      background: linear-gradient(45deg, var(--accent), transparent);
      width: 30vmin;
      height: 2vmin;
      filter: blur(8px);
      border-radius: 40%;
      opacity: 0.25;
      animation: floatLine 18s infinite alternate;
    }
    .shape-dot {
      width: 1vmin;
      height: 1vmin;
      background: var(--accent);
      filter: blur(2px);
      opacity: 0.5;
      border-radius: 50%;
      animation: floatDot 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4%, 6%) scale(1.1); }
    }
    @keyframes floatLine {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(5%, 8%) rotate(15deg); }
    }
    @keyframes floatDot {
      0% { transform: translate(0, 0); }
      100% { transform: translate(20px, -15px); }
    }

    /* individually placed shapes (many, for rich background) */
    .shape1 { width: 70vmax; height: 70vmax; top: -20vmax; left: -10vmax; background: radial-gradient(circle, rgba(107,142,76,0.5) 0%, transparent 80%); animation-duration: 30s; }
    .shape2 { width: 45vmin; height: 45vmin; bottom: 5vh; right: 2vw; background: radial-gradient(circle, #b8775e 0%, transparent 80%); opacity: 0.4; animation-duration: 22s; filter: blur(35px); }
    .shape3 { width: 60vmin; height: 60vmin; top: 30vh; left: 15vw; background: radial-gradient(circle, #2e8b6f 0%, transparent 80%); opacity: 0.3; animation-duration: 26s; filter: blur(40px); }
    .shape4 { width: 25vmin; height: 25vmin; bottom: 20vh; left: 30vw; background: radial-gradient(circle, #d4a373 0%, transparent 80%); border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; filter: blur(28px); opacity: 0.4; animation-duration: 20s; }
    .shape5 { width: 15vmin; height: 15vmin; top: 15vh; right: 20vw; background: #6b8e4c; filter: blur(15px); opacity: 0.25; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; animation-duration: 18s; }
    .shape6 { width: 35vmin; height: 10vmin; top: 60vh; left: 40vw; background: linear-gradient(90deg, #b5838d, #2e8b6f); filter: blur(20px); opacity: 0.3; border-radius: 50%; animation: floatLine 28s infinite alternate; }
    .shape7 { width: 8vmin; height: 8vmin; top: 70vh; left: 10vw; background: #e5989b; filter: blur(8px); opacity: 0.6; border-radius: 50%; animation: floatDot 12s infinite alternate; }
    .shape8 { width: 12vmin; height: 12vmin; bottom: 10vh; right: 30vw; background: #cd9777; filter: blur(12px); opacity: 0.4; border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; animation: float 21s infinite alternate; }
    .shape9 { width: 50vmin; height: 50vmin; top: -5vmin; right: -5vmin; background: radial-gradient(circle, #8f9eb5 0%, transparent 80%); filter: blur(45px); opacity: 0.25; animation-duration: 32s; }
    .shape10 { width: 20vmin; height: 20vmin; bottom: 30vh; left: 60vw; background: #b1b8c5; filter: blur(20px); opacity: 0.3; border-radius: 20% 80% 80% 20% / 20% 20% 80% 80%; animation: float 19s infinite alternate; }
    .shape11 { width: 5vmin; height: 5vmin; top: 40vh; left: 80vw; background: #ffcdb2; filter: blur(5px); opacity: 0.7; border-radius: 50%; animation: floatDot 9s infinite; }
    .shape12 { width: 40vmin; height: 40vmin; top: 80vh; left: 5vw; background: radial-gradient(circle, #acb7c9 0%, transparent 80%); filter: blur(38px); opacity: 0.3; animation-duration: 27s; }

    /* main app container - relative to sit above floating shapes */
    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      position: relative;
      z-index: 2;
    }

    /* ---------- top bar (wordmark, search, theme) ---------- */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      backdrop-filter: blur(2px);
    }
    .wordmark {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }
    .wordmark span {
      color: var(--accent);
      font-weight: 500;
      margin-left: 2px;
    }

    .search-wrapper {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    .search-field {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 50px;
      padding: 0.4rem 0.4rem 0.4rem 1.2rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
    }
    .search-field:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .search-field i {
      color: var(--ink-muted);
      font-size: 0.9rem;
    }
    .search-field input {
      border: none;
      background: transparent;
      padding: 0.5rem 0.8rem;
      font-size: 0.95rem;
      width: 100%;
      color: var(--ink);
      font-family: var(--font-ui);
      outline: none;
    }
    .search-field input::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }
    .search-field button {
      background: none;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: var(--ink-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      font-size: 0.8rem;
    }
    .search-field button:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .theme-toggle {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 50px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.02);
    }

    /* ---------- hero / quote of the day ---------- */
    .hero {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 2.2rem 2.5rem;
      margin-bottom: 2.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      justify-content: space-between;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
    }
    .hero-quote-block {
      flex: 2 1 350px;
    }
    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .hero-label i {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .hero-quote {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 1.5rem;
      quotes: "“" "”";
    }
    .hero-quote::before {
      content: "“";
      color: var(--accent);
      font-size: 2.2rem;
      line-height: 0;
      margin-right: 2px;
      opacity: 0.7;
    }
    .hero-quote::after {
      content: "”";
      color: var(--accent);
      font-size: 2.2rem;
      line-height: 0;
      margin-left: 2px;
      opacity: 0.7;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .hero-cat {
      background: var(--accent-soft);
      padding: 0.35rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid transparent;
    }
    .hero-copy {
      background: transparent;
      border: 1.5px solid var(--line-strong);
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-ui);
    }
    .hero-copy:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .hero-stats {
      flex: 1 1 220px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .stat-cards {
      display: flex;
      gap: 1rem;
    }
    .stat-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 1.2rem 1rem;
      text-align: center;
      flex: 1;
      border: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--ink-muted);
    }
    .hero-tagline {
      font-style: italic;
      color: var(--ink-soft);
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      font-size: 0.95rem;
      margin-top: auto;
    }

    /* ---------- categories tabs (scrollable pills) ---------- */
    .categories-wrap {
      margin: 1.8rem 0 1.2rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.2rem;
    }
    .tabs-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-row::-webkit-scrollbar {
      height: 4px;
      background: transparent;
    }
    .tabs-row::-webkit-scrollbar-thumb {
      background: var(--line-strong);
      border-radius: 8px;
    }
    .tab {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 40px;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-ui);
      backdrop-filter: blur(4px);
    }
    .tab i {
      font-size: 0.75rem;
      color: var(--ink-muted);
    }
    .tab:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--ink);
    }
    .tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }
    .tab.active i {
      color: white;
    }

    /* ---------- category header & count ---------- */
    .category-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 2rem 0 1.2rem;
    }
    .category-header h2 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .category-header span {
      font-size: 0.9rem;
      color: var(--ink-muted);
      background: var(--surface);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      border: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }

    /* ---------- quote grid (elegant cards) ---------- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 1.8rem 1.5rem 1.5rem;
      border: 1px solid var(--line);
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      backdrop-filter: blur(4px);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow-focus);
    }
    .card-num {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 1px;
    }
    .card-quote {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      flex: 1;
      quotes: "“" "”";
    }
    .card-quote::before {
      content: "“";
      color: var(--accent);
      opacity: 0.5;
      margin-right: 2px;
    }
    .card-quote::after {
      content: "”";
      color: var(--accent);
      opacity: 0.5;
      margin-left: 2px;
    }
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
    }
    .card-tag {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink-muted);
      letter-spacing: 0.4px;
      background: var(--bg);
      padding: 0.25rem 0.8rem;
      border-radius: 30px;
      border: 1px solid var(--line);
    }
    .card-btns {
      display: flex;
      gap: 6px;
    }
    .cbtn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--line);
      background: var(--bg);
      color: var(--ink-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      font-size: 0.75rem;
      backdrop-filter: blur(4px);
    }
    .cbtn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* empty state */
    .empty-state {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 4rem 2rem;
      text-align: center;
      border: 1px dashed var(--line);
      color: var(--ink-soft);
      backdrop-filter: blur(4px);
    }
    .empty-state i {
      font-size: 2.5rem;
      color: var(--ink-muted);
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    .empty-state h3 {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    /* ---------- pagination ---------- */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
    }
    .pbtn {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 40px;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-ui);
      backdrop-filter: blur(4px);
    }
    .pbtn:not(:disabled):hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .pbtn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 0.9rem;
      color: var(--ink-muted);
      font-weight: 500;
    }

    /* ---------- toast ---------- */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5FCB8A;
    }

    /* responsive */
    @media (max-width: 700px) {
      .app { padding: 1rem; }
      .hero { flex-direction: column; gap: 1.5rem; padding: 1.8rem; }
      .hero-quote { font-size: 1.5rem; }
      .top-bar { gap: 1rem; }
      .search-wrapper { max-width: 100%; }
    }
    @media (max-width: 450px) {
      .stat-cards { flex-direction: column; }
      .pagination { flex-wrap: wrap; gap: 1rem; }
    }
  </style>
</head>
<body>
  <!-- floating background objects (12+ distinct shapes, visible and animated) -->
  <div class="floating-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>
    <div class="shape shape5"></div>
    <div class="shape shape6"></div>
    <div class="shape shape7"></div>
    <div class="shape shape8"></div>
    <div class="shape shape9"></div>
    <div class="shape shape10"></div>
    <div class="shape shape11"></div>
    <div class="shape shape12"></div>
    <!-- add a few extra line/dot variations -->
    <div class="shape shape-line" style="width: 40vmin; height: 2.5vmin; top: 20vh; left: 70vw; background: linear-gradient(90deg, #b8775e, #2e8b6f); filter: blur(10px); opacity: 0.3; animation-duration: 25s;"></div>
    <div class="shape shape-dot" style="width: 1.8vmin; height: 1.8vmin; top: 85vh; left: 15vw; background: #d94f3b; filter: blur(3px); opacity: 0.7; animation-duration: 14s;"></div>
    <div class="shape shape-dot" style="width: 2.2vmin; height: 2.2vmin; top: 45vh; left: 45vw; background: #2e8b6f; filter: blur(4px); opacity: 0.6; animation-duration: 19s;"></div>
  </div>

  <div class="app">
    <!-- top bar with wordmark / search / theme toggle -->
    <div class="top-bar">
      <div class="wordmark">quote<span>folio</span></div>
      <div class="search-wrapper">
        <div class="search-field">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search any quote..." autocomplete="off">
          <button id="searchClear"><i class="fas fa-times"></i></button>
        </div>
      </div>

    // state
    let cat = 'motivational', page = 1, filtered = [];
    const PER = 6;

    // dom elements (same ids)
    const $tabs   = document.getElementById('tabsInner');
    const $grid   = document.getElementById('quotesGrid');
    const $title  = document.getElementById('catTitle');
    const $ctr    = document.getElementById('counter');
    const $prev   = document.getElementById('prevPage');
    const $next   = document.getElementById('nextPage');
    const $pinfo  = document.getElementById('pageInfo');
    const $srch   = document.getElementById('searchInput');
    const $clr    = document.getElementById('searchClear');
    const $toast  = document.getElementById('toast');
    const $tmsg   = document.getElementById('toastMsg');
    const $theme  = document.getElementById('themeToggle');
    const $dq     = document.getElementById('dailyQuoteText');
    const $dcat   = document.getElementById('dailyQuoteCat');
    const $hcopy  = document.getElementById('heroCopy');

    function init() {
      setTheme(localStorage.getItem('theme') || 'light');
      buildTabs();
      setDailyQuote();
      setStats();
      render();
      bind();
    }

    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('iMoon').style.display = t === 'dark' ? 'none' : 'block';
      document.getElementById('iSun').style.display  = t === 'dark' ? 'block' : 'none';
      localStorage.setItem('theme', t);
    }

    function setStats() {
      let n = 0;
      Object.values(DATA).forEach(c => n += c.quotes.length);
      document.getElementById('totalQuotes').textContent = n;
      document.getElementById('totalCats').textContent = Object.keys(DATA).length;
    }

    let dailyText = '';
    function setDailyQuote() {
      const all = [];
      Object.values(DATA).forEach(c => c.quotes.forEach(q => all.push({ text: q, cat: c.name })));
      const d = new Date();
      const i = (d.getFullYear() * 10000 + (d.getMonth()+1)*100 + d.getDate()) % all.length;
      dailyText = all[i].text;
      $dq.textContent   = dailyText;
      $dcat.textContent = all[i].cat;
    }

    function buildTabs() {
      $tabs.innerHTML = '';
      Object.entries(DATA).forEach(([key, c]) => {
        const b = document.createElement('button');
        b.className = `tab${key === cat ? ' active' : ''}`;
        b.dataset.key = key;
        b.innerHTML = `<i class="${c.icon}"></i>${c.name}`;
        b.addEventListener('click', () => {
          cat = key; page = 1;
          $tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
          b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          render();
        });
        $tabs.appendChild(b);
      });
    }

    function render() {
      const c  = DATA[cat];
      const q  = $srch.value.trim().toLowerCase();
      filtered = q ? c.quotes.filter(s => s.toLowerCase().includes(q)) : [...c.quotes];

      const total = Math.ceil(filtered.length / PER) || 1;
      if (page > total) page = total;
      const s = (page-1)*PER, e = Math.min(s+PER, filtered.length);
      const slice = filtered.slice(s, e);

      $title.textContent = c.name;
      $ctr.textContent   = filtered.length ? `${s+1}–${e} of ${filtered.length} quotes` : '';
      $pinfo.textContent = total > 1 ? `page ${page} of ${total}` : '';
      $prev.disabled = page === 1;
      $next.disabled = page >= total;

      $grid.innerHTML = '';

      if (!slice.length) {
        $grid.innerHTML = `<div class="empty-state">
          <i class="fas fa-search"></i>
          <h3>No matches</h3>
          <p>try another keyword or category</p>
        </div>`;
        return;
      }

      const g = document.createElement('div');
      g.className = 'grid';
      slice.forEach((quote, idx) => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `
          <div class="card-num">#${String(s + idx + 1).padStart(2,'0')}</div>
          <p class="card-quote">${quote}</p>
          <div class="card-foot">
            <span class="card-tag">${c.name}</span>
            <div class="card-btns">
              <button class="cbtn copy-btn" title="Copy"><i class="fas fa-copy"></i></button>
              <button class="cbtn share-btn" title="Share"><i class="fas fa-share-nodes"></i></button>
            </div>
          </div>`;
        d.querySelector('.copy-btn').onclick  = () => copy(quote, 'Copied to clipboard');
        d.querySelector('.share-btn').onclick = () => {
          if (navigator.share) navigator.share({ title: c.name, text: quote, url: location.href });
          else copy(quote, 'Copied — share manually!');
        };
        g.appendChild(d);
      });
      $grid.appendChild(g);
    }

    let tt;
    function copy(text, msg) {
      navigator.clipboard.writeText(text).then(() => {
        $tmsg.textContent = msg;
        $toast.classList.add('show');
        clearTimeout(tt);
        tt = setTimeout(() => $toast.classList.remove('show'), 3000);
      });
    }

    function bind() {
      $prev.onclick = () => { if(page>1){ page--; render(); scrollTo({top:0,behavior:'smooth'}); }};
      $next.onclick = () => {
        if(page < Math.ceil(filtered.length/PER)){ page++; render(); scrollTo({top:0,behavior:'smooth'}); }
      };
      $srch.addEventListener('input', () => { page=1; render(); });
      $clr.onclick = () => { $srch.value=''; page=1; render(); };
      $theme.onclick = () => {
        const t = document.documentElement.getAttribute('data-theme');
        setTheme(t === 'dark' ? 'light' : 'dark');
      };
      $hcopy.onclick = () => copy(dailyText, 'Quote of the day copied!');
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft')  $prev.click();
        if (e.key === 'ArrowRight') $next.click();
      });
    }

    init();
  </script>
</body>
</html>
